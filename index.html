HTML
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>G Finances</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
    flex-direction: column;
    gap: 20px;
}

.container {
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(10px);
    width: 100%;
    max-width: 700px;
    padding: 30px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

h1 {
    text-align: center;
    margin-bottom: 10px;
    font-size: 2.5rem;
}

.subtitle {
    text-align: center;
    margin-bottom: 25px;
    color: #cbd5e1;
}

.form-group {
    margin-bottom: 18px;
}

label {
    display: block;
    margin-bottom: 8px;
    font-weight: bold;
}

input {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    font-size: 1rem;
    background: #f8fafc;
    color: #0f172a;
}

button {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 12px;
    background: #22c55e;
    color: white;
    font-size: 1rem;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
    margin-top: 10px;
}

button:hover {
    background: #16a34a;
    transform: scale(1.02);
}

.btn-secondary {
    background: #38bdf8;
    margin-top: 15px;
}
.btn-secondary:hover {
    background: #0284c7;
}

.btn-danger {
    background: #ef4444;
    padding: 8px 12px;
    font-size: 0.85rem;
    width: auto;
    margin: 0;
}
.btn-danger:hover {
    background: #dc2626;
}

.results {
    margin-top: 30px;
    background: rgba(255,255,255,0.06);
    padding: 20px;
    border-radius: 15px;
}

.result-box {
    margin-bottom: 15px;
    padding: 15px;
    border-radius: 12px;
    background: rgba(255,255,255,0.05);
}

.result-title {
    color: #38bdf8;
    font-weight: bold;
    margin-bottom: 5px;
}

/* Host Panel & Table Styling */
.host-section {
    margin-top: 30px;
    border-top: 2px dashed rgba(255,255,255,0.2);
    padding-top: 20px;
}

.host-profile-box {
    background: rgba(255, 255, 255, 0.05);
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 20px;
}

.flex-container {
    display: flex; 
    gap: 10px; 
    margin-top: 8px;
}

.table-wrapper {
    overflow-x: auto;
    margin-top: 15px;
}

table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
    font-size: 0.9rem;
    background: rgba(15, 23, 42, 0.6);
    border-radius: 10px;
    overflow: hidden;
}

th, td {
    padding: 12px;
    text-align: left;
    border-bottom: 1px solid rgba(255,255,255,0.1);
}

th {
    background-color: #1e293b;
    color: #38bdf8;
}

tr:hover {
    background: rgba(255,255,255,0.05);
}

.footer {
    text-align: center;
    margin-top: 20px;
    color: #94a3b8;
    font-size: 0.9rem;
}

@media (max-width: 600px) {
    h1 {
        font-size: 2rem;
    }
}
</style>
</head>
<body>

<div class="container">
    <h1>G Finances</h1>
    <p class="subtitle">Loan & Interest Tracking System</p>

    <div class="form-group">
        <label for="customerName">Customer Name</label>
        <input type="text" id="customerName" placeholder="Enter customer name" />
    </div>
    
    <div class="form-group">
        <label for="principal">Principal Amount ($)</label>
        <input type="number" id="principal" min="0" step="any" placeholder="e.g. 5000" />
    </div>

    <div class="form-group">
        <label for="interestRate">Annual Interest Rate (%)</label>
        <input type="number" id="interestRate" min="0" step="any" placeholder="e.g. 5" />
    </div>

    <div class="form-group">
        <label for="duration">Duration (Years)</label>
        <input type="number" id="duration" min="0" step="any" placeholder="e.g. 3" />
    </div>

    <button onclick="calculateLoan()">Calculate & Save</button>

    <div class="results" id="resultsPanel" style="display: none;">
        <div class="result-box">
            <div class="result-title">Total Interest Earned</div>
            <div id="outInterest">$0.00</div>
        </div>
        <div class="result-box">
            <div class="result-title">Total Balance Payable</div>
            <div id="outTotal">$0.00</div>
        </div>
    </div>

    <div class="host-section">
        <div class="host-profile-box">
            <div class="result-title">Global Portfolio Metrics</div>
            <div class="flex-container">
                <div>Total Active Records: <span id="totalRecords">0</span></div>
            </div>
        </div>

        <label>Active Loan Ledger</label>
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Customer</th>
                        <th>Principal</th>
                        <th>Rate</th>
                        <th>Term</th>
                        <th>Total Due</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="ledgerBody">
                    </tbody>
            </table>
        </div>
    </div>
</div>

<div class="footer">
    &copy; 2026 G Finances. Secure, Analytical Ledger.
</div>

<script>
    // State management array to hold our calculated logs
    let loanLedger = [];

    function calculateLoan() {
        // 1. Fetch values from inputs
        const name = document.getElementById('customerName').value.trim();
        const principal = parseFloat(document.getElementById('principal').value);
        const rate = parseFloat(document.getElementById('interestRate').value);
        const duration = parseFloat(document.getElementById('duration').value);

        // 2. Simple field validation
        if (!name || isNaN(principal) || isNaN(rate) || isNaN(duration)) {
            alert("Please accurately complete all input fields.");
            return;
        }

        // 3. Mathematical Interest Calculations (Simple Interest Base)
        const interestEarned = principal * (rate / 100) * duration;
        const totalPayable = principal + interestEarned;

        // 4. Update the quick live display box
        document.getElementById('outInterest').innerText = `$${interestEarned.toFixed(2)}`;
        document.getElementById('outTotal').innerText = `$${totalPayable.toFixed(2)}`;
        document.getElementById('resultsPanel').style.display = 'block';

        // 5. Store record in the ledger array state
        const record = {
            id: Date.now(), // simple unique timestamp ID
            name: name,
            principal: principal,
            rate: rate,
            duration: duration,
            total: totalPayable
        };
        loanLedger.push(record);

        // 6. Reset Form Fields
        document.getElementById('customerName').value = '';
        document.getElementById('principal').value = '';
        document.getElementById('interestRate').value = '';
        document.getElementById('duration').value = '';

        // 7. Refresh user interface components
        renderLedger();
    }

    function deleteRecord(id) {
        // Filter out target item
        loanLedger = loanLedger.filter(item => item.id !== id);
        renderLedger();
    }

    function renderLedger() {
        const tbody = document.getElementById('ledgerBody');
        const countSpan = document.getElementById('totalRecords');
        
        // Clear old rows
        tbody.innerHTML = '';
        
        // Update metric flag
        countSpan.innerText = loanLedger.length;

        // Rebuild table body structures
        loanLedger.forEach(item => {
            const row = document.createElement('tr');
            
            row.innerHTML = `
                <td>${escapeHTML(item.name)}</td>
                <td>$${item.principal.toFixed(2)}</td>
                <td>${item.rate}%</td>
                <td>${item.duration} ${item.duration === 1 ? 'Yr' : 'Yrs'}</td>
                <td><strong>$${item.total.toFixed(2)}</strong></td>
                <td>
                    <button class="btn-danger" onclick="deleteRecord(${item.id})">Delete</button>
                </td>
            `;
            tbody.appendChild(row);
        });
    }

    // Helper function to escape special characters to mitigate potential XSS
    function escapeHTML(str) {
        return str.replace(/[&<>'"]/g, 
            tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)
        );
    }
</script>

</body>
</html>
