<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>G Finances</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
    flex-direction: column;
    gap: 20px;
}

.container {
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(10px);
    width: 100%;
    max-width: 700px;
    padding: 30px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

h1 {
    text-align: center;
    margin-bottom: 10px;
    font-size: 2.5rem;
}

.subtitle {
    text-align: center;
    margin-bottom: 25px;
    color: #cbd5e1;
}

.form-group {
    margin-bottom: 18px;
}

label {
    display: block;
    margin-bottom: 8px;
    font-weight: bold;
}

input {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    font-size: 1rem;
    background: #f8fafc;
    color: #0f172a;
}

button {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 12px;
    background: #22c55e;
    color: white;
    font-size: 1rem;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
    margin-top: 10px;
}

button:hover {
    background: #16a34a;
    transform: scale(1.02);
}

.btn-secondary {
    background: #38bdf8;
    margin-top: 15px;
}
.btn-secondary:hover {
    background: #0284c7;
}

.btn-danger {
    background: #ef4444;
    padding: 8px 12px;
    font-size: 0.85rem;
    width: auto;
    margin: 0;
}
.btn-danger:hover {
    background: #dc2626;
}

.results {
    margin-top: 30px;
    background: rgba(255,255,255,0.06);
    padding: 20px;
    border-radius: 15px;
}

.result-box {
    margin-bottom: 15px;
    padding: 15px;
    border-radius: 12px;
    background: rgba(255,255,255,0.05);
}

.result-title {
    color: #38bdf8;
    font-weight: bold;
    margin-bottom: 5px;
}

/* Host Panel & Table Styling */
.host-section {
    margin-top: 30px;
    border-top: 2px dashed rgba(255,255,255,0.2);
    padding-top: 20px;
}

.host-profile-box {
    background: rgba(255, 255, 255, 0.05);
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 20px;
}

.flex-container {
    display: flex; 
    gap: 10px; 
    margin-top: 8px;
}

.table-wrapper {
    overflow-x: auto;
    margin-top: 15px;
}

table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
    font-size: 0.9rem;
    background: rgba(15, 23, 42, 0.6);
    border-radius: 10px;
    overflow: hidden;
}

th, td {
    padding: 12px;
    text-align: left;
    border-bottom: 1px solid rgba(255,255,255,0.1);
}

th {
    background-color: #1e293b;
    color: #38bdf8;
}

tr:hover {
    background: rgba(255,255,255,0.05);
}

.footer {
    text-align: center;
    margin-top: 20px;
    color: #94a3b8;
    font-size: 0.9rem;
}

@media (max-width: 600px) {
    h1 {
        font-size: 2rem;
    }
}
</style>
</head>
<body>

<div class="container">
    <h1>G Finances</h1>
    <p class="subtitle">Loan & Interest Tracking System</p>

    <div class="form-group">
        <label>Customer Name</label>
        <input type="text" id="customerName" placeholder="Enter customer name" />
    </div>
